spring:
  jpa:
    show-sql: true
  cloud:
    function:
      definition: partyStarted
    stream:
      bindings:
        partyStarted-out-0:
          destination: party-started
        partyStarted-in-0:
          destination: party-started
          group: test
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS}
        bindings:
          partyStarted-out-0:
            producer:
              sync: true
              configuration:
                delivery.timeout.ms: 2000
                request.timeout.ms: 2000
